name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --extra all

      - name: Run Ruff lint
        run: uv run --extra all ruff check battlesim tests

      - name: Run Ruff format check
        run: uv run --extra all ruff format --check battlesim tests

  ty:
    name: Ty
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --extra all

      - name: Run ty
        run: uv run --extra all ty check battlesim tests/test_battle.py tests/test_composite.py tests/test_terrain.py
